# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Fallback: if the waybar-off toggle flag was left set (e.g. from SUPER+SHIFT+SPACE),
# clear it and launch waybar. If the flag is absent the default autostart already
# handled it, so this is a no-op — no double-launch possible.
exec-once = sh -c 'omarchy-toggle-enabled waybar-off && rm -f ~/.local/state/omarchy/toggles/waybar-off && uwsm-app -- waybar'
